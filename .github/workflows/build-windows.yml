name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        run: npm run dist

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sort-Zone-Solution-Windows
          path: dist/**
